<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gideon Dynamics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:#0b1220;
    color:#eef1f6;
    font-family:"Inter",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:28px;
    -webkit-font-smoothing:antialiased;
  }
  .field{position:fixed;inset:0;pointer-events:none;
    background:
      radial-gradient(820px 480px at 50% -12%, rgba(120,150,190,.14), transparent 64%),
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px) 0 0/100% 64px,
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px) 0 0/64px 100%;
    mask:radial-gradient(closest-side at 50% 42%, #000, transparent);
    -webkit-mask:radial-gradient(closest-side at 50% 42%, #000, transparent);
    opacity:.65;
  }
  main{position:relative;max-width:560px}
  .mark{width:40px;height:40px;border:1px solid rgba(199,162,75,.45);border-radius:9px;display:grid;place-items:center;margin:0 auto 28px;background:linear-gradient(180deg,#152034,#0c1322)}
  .mark:before{content:"";width:15px;height:15px;border:1.5px solid #c7a24b;transform:rotate(45deg);border-radius:2px}
  .brand{font-size:13px;letter-spacing:.36em;text-transform:uppercase;color:#9fb0c9}
  .rule{width:46px;height:1px;background:rgba(199,162,75,.5);margin:22px auto 0}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:400;font-size:clamp(32px,5.6vw,50px);line-height:1.12;letter-spacing:-.015em;margin:24px 0 0}
  h1 em{font-style:italic;color:#9fb6d4}
  p{color:#9fb0c9;font-size:17px;line-height:1.65;margin:24px auto 0;max-width:46ch}
  .tag{display:inline-flex;align-items:center;gap:9px;margin-top:36px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#c7a24b;border:1px solid rgba(199,162,75,.28);padding:8px 16px;border-radius:100px}
  .dot{width:6px;height:6px;border-radius:50%;background:#c7a24b}
  footer{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-size:11.5px;letter-spacing:.04em;color:#5d6a82}
</style>
</head>
<body>
<div class="field"></div>
<main>
  <div class="mark"></div>
  <div class="brand">Gideon Dynamics</div>
  <div class="rule"></div>
  <h1>Defense&#8209;grade intelligence,<br><em>institutional discipline.</em></h1>
  <p>Sovereign data and infrastructure for the defense industrial base — owned, controlled, and built to endure.</p>
  <span class="tag"><span class="dot"></span> Coming soon</span>
</main>
<footer>&copy; 2026 Gideon Dynamics &nbsp;·&nbsp; Defense &amp; industrial intelligence</footer>
</body>
</html>
